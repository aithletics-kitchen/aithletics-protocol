          totalNutrition.kcal += food.kcal * multiplier;
          totalNutrition.protein += food.protein * multiplier;
          totalNutrition.carbs += food.carbs * multiplier;
          totalNutrition.fats += food.fats * multiplier;
        }
      });
      recipe.totalNutrition = {
        kcal: Math.round(totalNutrition.kcal),
        protein: Math.round(totalNutrition.protein * 10) / 10,
        carbs: Math.round(totalNutrition.carbs * 10) / 10,

      const [targetMacros, setTargetMacros] = useState({ kcal: 500, protein: 40, carbs: 50, fats: 15 });
      const [workoutFilters, setWorkoutFilters] = useState({ preWorkout: false, intraWorkout: false, postWorkout: false });
      const [selectedAllergens, setSelectedAllergens] = useState([]);
      const [suggestions, setSuggestions] = useState([]);
      const [selectedRecipes, setSelectedRecipes] = useState([]);
      const [showDatabase, setShowDatabase] = useState(false);
      const [activeTab, setActiveTab] = useState('input');

      const calculateMatchScore = (recipe, targets) => {
        const nutrition = recipe.totalNutrition;
        const kcalDiff = Math.abs(nutrition.kcal - targets.kcal) / targets.kcal;
        const proteinDiff = Math.abs(nutrition.protein - targets.protein) / targets.protein;
        const carbsDiff = Math.abs(nutrition.carbs - targets.carbs) / targets.carbs;
        const fatsDiff = Math.abs(nutrition.fats - targets.fats) / targets.fats;
        return (kcalDiff * 0.3) + (proteinDiff * 0.4) + (carbsDiff * 0.15) + (fatsDiff * 0.15);
      };

      const calculatePortionAdjustment = (recipe, targetKcal) => {
        return targetKcal / recipe.totalNutrition.kcal;
      };

      const recipeContainsAllergen = (recipe) => {
        if (selectedAllergens.length === 0) return false;
        for (const ing of recipe.ingredients) {
          const food = foodDatabase[ing.foodId];
          if (food && food.allergens) {
            for (const allergen of food.allergens) {
              if (selectedAllergens.includes(allergen)) return true;
            }
          }
        }
        return false;
      };

      const toggleAllergen = (allergenId) => {
        setSelectedAllergens(prev => 
          prev.includes(allergenId) ? prev.filter(a => a !== allergenId) : [...prev, allergenId]
        );
      };

      const findMatchingRecipes = () => {
        const anyWorkoutFilter = workoutFilters.preWorkout || workoutFilters.intraWorkout || workoutFilters.postWorkout;
        
        if (anyWorkoutFilter) {
          let workoutRecipes = [];
          if (workoutFilters.preWorkout) {
            workoutRecipes.push(...recipeDatabase.filter(r => r.category === 'pre-workout' && !recipeContainsAllergen(r))
              .map(r => ({ ...r, score: calculateMatchScore(r, targetMacros), portionMultiplier: calculatePortionAdjustment(r, targetMacros.kcal) })));
          }
          if (workoutFilters.intraWorkout) {
            workoutRecipes.push(...recipeDatabase.filter(r => r.category === 'intra-workout' && !recipeContainsAllergen(r))
              .map(r => ({ ...r, score: calculateMatchScore(r, targetMacros), portionMultiplier: calculatePortionAdjustment(r, targetMacros.kcal) })));
          }
          if (workoutFilters.postWorkout) {
            workoutRecipes.push(...recipeDatabase.filter(r => r.category === 'post-workout' && !recipeContainsAllergen(r))
              .map(r => ({ ...r, score: calculateMatchScore(r, targetMacros), portionMultiplier: calculatePortionAdjustment(r, targetMacros.kcal) })));
          }
          setSuggestions(workoutRecipes);
          setActiveTab('suggestions');
          return;
        }

        const scoredRecipes = recipeDatabase
          .filter(r => !['pre-workout', 'intra-workout', 'post-workout'].includes(r.category) && !recipeContainsAllergen(r))
          .map(r => ({ ...r, score: calculateMatchScore(r, targetMacros), portionMultiplier: calculatePortionAdjustment(r, targetMacros.kcal) }));
        
        scoredRecipes.sort((a, b) => a.score - b.score);
        const veganRecipes = scoredRecipes.filter(r => r.isVegan);
        const result = scoredRecipes.slice(0, 2);
        
        if (!result.some(r => r.isVegan) && veganRecipes.length > 0 && !result.find(r => r.id === veganRecipes[0].id)) {
          result[1] = veganRecipes[0];
        }
        
        while (result.length < 3) {
          const remaining = scoredRecipes.filter(r => !result.find(res => res.id === r.id));
          if (remaining.length > 0) {
            const needVegan = !result.some(r => r.isVegan);
            result.push(needVegan ? (remaining.find(r => r.isVegan) || remaining[0]) : remaining[0]);
          } else break;
        }
        
        setSuggestions(result.slice(0, 3));
        setActiveTab('suggestions');
      };

      const addToSelection = (recipe) => {
        if (!selectedRecipes.find(r => r.id === recipe.id)) {
          setSelectedRecipes([...selectedRecipes, recipe]);
        }
      };

      const removeFromSelection = (recipeId) => {
        setSelectedRecipes(selectedRecipes.filter(r => r.id !== recipeId));
      };

      const generateShoppingList = useMemo(() => {
        const itemsMap = new Map();
        selectedRecipes.forEach(recipe => {
          recipe.ingredients.forEach(ing => {
            const food = foodDatabase[ing.foodId];
            if (food) {
              const adjustedAmount = Math.round(ing.amount * recipe.portionMultiplier);
              if (itemsMap.has(ing.foodId)) {
                itemsMap.set(ing.foodId, { ...itemsMap.get(ing.foodId), amount: itemsMap.get(ing.foodId).amount + adjustedAmount });
              } else {
                itemsMap.set(ing.foodId, { name: food.name, amount: adjustedAmount, category: food.category });
              }
            }
          });
        });
        const grouped = {};
        itemsMap.forEach((item) => {
          if (!grouped[item.category]) grouped[item.category] = [];
          grouped[item.category].push(item);
        });
        return grouped;
      }, [selectedRecipes]);

          text += `${categoryNames[category] || category.toUpperCase()}\n` + "-".repeat(30) + "\n";

          text += "\n";

        URL.revokeObjectURL(url);

                          <div key={recipe.id} className="border border-hairline bg-paper p-6 md:p-7 flex flex-col">
                            <div className="flex justify-between items-center gap-3 font-mono text-[11px] tracking-[0.14em] uppercase text-sage">
                              <span>{categoryLabels[recipe.category] || recipe.category}{recipe.isVegan ? ' · Vegan' : ''}</span>
                              <span className="inline-flex items-center gap-1.5 whitespace-nowrap"><ClockIcon />{recipe.prepTime} Min · {difficultyLabels[recipe.difficulty] || recipe.difficulty}</span>
                            </div>

                            <h3 className="font-serif font-semibold text-[25px] leading-[1.15] mt-3">{recipe.name}</h3>

                            <div className="my-4"><Fleuron /></div>

                            <div>
                              {recipe.ingredients.map((ing, i) => (
                                <div key={i} className="flex items-baseline gap-2.5 py-2 border-b border-hairline last:border-b-0 text-[14.5px]">
                                  <span>{ing.name}</span>
                                  <span className="dots"></span>
                                  <span className="font-mono text-[13px] whitespace-nowrap">{Math.round(ing.amount * recipe.portionMultiplier)} g</span>
                                </div>
                              ))}
                            </div>

                            <MacroLine n={adjustedNutrition} />

                            {portionPercent !== 100 && (
                              <p className="text-muted text-xs mt-2.5">Portion auf deine Ziele skaliert ({portionPercent} %).</p>
                            )}

                            <button
                              onClick={() => addToSelection(recipe)}
                              disabled={isSelected}
                              className={`w-full mt-5 py-3.5 text-[14.5px] font-medium tracking-wide transition-colors focus-visible:outline focus-visible:outline-2 focus-visible:outline-ink focus-visible:outline-offset-2 ${
                                isSelected
                                  ? 'border border-hairline text-muted cursor-default'
                                  : 'bg-burgundy hover:bg-burgundydark text-paper'
                              }`}
                            >
                              {isSelected ? 'Im Menü' : 'Ins Menü'}
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </section>
              )}

              {activeTab === 'selection' && (
                <section className="border border-hairline bg-paper p-6 md:p-10">
                  <h2 className="font-serif font-semibold text-2xl md:text-[28px]">Dein Menü</h2>

                  {selectedRecipes.length === 0 ? (
                    <div className="text-center py-14">
                      <Fleuron />
                      <p className="text-muted mt-4">Noch leer. Wähle unter „Rezepte“ aus, was auf den Tisch kommt.</p>
                    </div>
                  ) : (
                    <>
                      <div className="mt-8">
                        {selectedRecipes.map(recipe => {
                          const adjustedNutrition = getAdjustedNutrition(recipe);
                          return (
                            <div key={recipe.id} className="flex items-center gap-4 py-4 border-b border-hairline">
                              <div className="flex-1 min-w-0">
                                <h3 className="font-serif font-semibold text-lg leading-tight">
                                  {recipe.name}
                                  {recipe.isVegan && <span className="font-mono font-normal text-[10px] tracking-[0.14em] uppercase text-sage ml-2 align-middle">Vegan</span>}
                                </h3>
                                <p className="font-mono text-[12.5px] text-muted mt-1">
                                  {adjustedNutrition.kcal} kcal · {adjustedNutrition.protein} P · {adjustedNutrition.carbs} C · {adjustedNutrition.fats} F
                                </p>
                              </div>
                              <button
                                onClick={() => removeFromSelection(recipe.id)}
                                aria-label={`${recipe.name} entfernen`}
                                className="w-9 h-9 border border-hairline text-muted hover:border-burgundy hover:text-burgundy transition-colors flex items-center justify-center shrink-0"
                              >
                                ✕
                              </button>
                            </div>
                          );
                        })}
                      </div>

                      {(() => {
                        const totals = selectedRecipes.reduce((acc, recipe) => {
                          const adj = getAdjustedNutrition(recipe);
                          return { kcal: acc.kcal + adj.kcal, protein: acc.protein + adj.protein, carbs: acc.carbs + adj.carbs, fats: acc.fats + adj.fats };
                        }, { kcal: 0, protein: 0, carbs: 0, fats: 0 });
                        return (
                          <div className="mt-6 py-3 border-t-2 border-ink font-mono text-[13px] flex justify-between flex-wrap gap-x-3 gap-y-1">
                            <span className="uppercase tracking-[0.14em] text-[11px] self-center">Gesamt</span>
                            <span className="flex gap-x-4 flex-wrap">
                              <span><b className="font-medium text-burgundy">{Math.round(totals.kcal)}</b> kcal</span>
                              <span><b className="font-medium text-burgundy">{Math.round(totals.protein)}</b> g Protein</span>
                              <span><b className="font-medium text-burgundy">{Math.round(totals.carbs)}</b> g Carbs</span>
                              <span><b className="font-medium text-burgundy">{Math.round(totals.fats)}</b> g Fett</span>
                            </span>
                          </div>
                        );
                      })()}

                      <button
                        onClick={() => setActiveTab('shopping')}
                        className="w-full mt-8 bg-burgundy hover:bg-burgundydark text-paper py-4 text-[15px] font-medium tracking-wide transition-colors focus-visible:outline focus-visible:outline-2 focus-visible:outline-ink focus-visible:outline-offset-2"
                      >
                        Zur Einkaufsliste
                      </button>
                    </>
                  )}
                </section>
              )}

              {activeTab === 'shopping' && (
                <section className="border border-hairline bg-paper p-6 md:p-10">
                  <div className="flex items-baseline justify-between flex-wrap gap-4">
                    <h2 className="font-serif font-semibold text-2xl md:text-[28px]">Einkaufsliste</h2>
                    {Object.keys(generateShoppingList).length > 0 && (
                      <button
                        onClick={exportShoppingList}
                        className="border border-ink/40 hover:border-ink px-4 py-2 text-[13.5px] font-medium transition-colors"
                      >
                        Als Textdatei exportieren
                      </button>
                    )}
                  </div>

                  {Object.keys(generateShoppingList).length === 0 ? (
                    <div className="text-center py-14">
                      <Fleuron />
                      <p className="text-muted mt-4">Noch leer. Stell dir unter „Rezepte“ ein Menü zusammen, die Liste entsteht von selbst.</p>
                    </div>
                  ) : (
                    <div className="mt-8 space-y-8">
                      {Object.entries(generateShoppingList).map(([category, items]) => (
                        <div key={category}>
                          <h3 className="font-mono text-[11px] tracking-[0.16em] uppercase text-sage">{categoryNames[category] || category}</h3>
                          <div className="mt-2">
                            {items.map((item, i) => (
                              <div key={i} className="flex items-baseline gap-2.5 py-2 border-b border-hairline last:border-b-0 text-[14.5px]">
                                <span>{item.name}</span>
                                <span className="dots"></span>
                                <span className="font-mono text-[13px] whitespace-nowrap">{item.amount} g</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </section>
              )}
            </main>

            <footer className="mt-16 md:mt-20 text-center">
              <Fleuron />
              <p className="font-mono text-[11px] tracking-[0.18em] uppercase text-muted mt-4">Tiltheman's Kitchen · AIthletics</p>
              <p className="text-muted text-[13px] mt-2">Die Tools sind frei. Was du bezahlst, ist die Person im Raum.</p>
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<NutritionCoachApp />);
  </script>
</body>
</html>
