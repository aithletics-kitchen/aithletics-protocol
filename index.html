    // Calculate nutrition for each recipe
    recipeDatabase.forEach(recipe => {
      let totalNutrition = { kcal: 0, protein: 0, carbs: 0, fats: 0 };
      recipe.ingredients.forEach(ing => {
        const food = foodDatabase[ing.foodId];
        if (food) {
          const multiplier = ing.amount / 100;
          totalNutrition.kcal += food.kcal * multiplier;
          totalNutrition.protein += food.protein * multiplier;
          totalNutrition.carbs += food.carbs * multiplier;
          totalNutrition.fats += food.fats * multiplier;
        }
      });
      recipe.totalNutrition = {
        kcal: Math.round(totalNutrition.kcal),
        protein: Math.round(totalNutrition.protein * 10) / 10,
        carbs: Math.round(totalNutrition.carbs * 10) / 10,

      const [targetMacros, setTargetMacros] = useState({ kcal: 500, protein: 40, carbs: 50, fats: 15 });

      const [selectedRecipes, setSelectedRecipes] = useState([]);

      const calculateMatchScore = (recipe, targets) => {
        const nutrition = recipe.totalNutrition;
        const kcalDiff = Math.abs(nutrition.kcal - targets.kcal) / targets.kcal;
        const proteinDiff = Math.abs(nutrition.protein - targets.protein) / targets.protein;
        const carbsDiff = Math.abs(nutrition.carbs - targets.carbs) / targets.carbs;
        const fatsDiff = Math.abs(nutrition.fats - targets.fats) / targets.fats;
        return (kcalDiff * 0.3) + (proteinDiff * 0.4) + (carbsDiff * 0.15) + (fatsDiff * 0.15);
      };

      const calculatePortionAdjustment = (recipe, targetKcal) => {
        return targetKcal / recipe.totalNutrition.kcal;
      };

      const recipeContainsAllergen = (recipe) => {
        if (selectedAllergens.length === 0) return false;
        for (const ing of recipe.ingredients) {
          const food = foodDatabase[ing.foodId];
          if (food && food.allergens) {
            for (const allergen of food.allergens) {
              if (selectedAllergens.includes(allergen)) return true;
            }
          }
        }
        return false;
      };

      const toggleAllergen = (allergenId) => {
        setSelectedAllergens(prev => 
          prev.includes(allergenId) ? prev.filter(a => a !== allergenId) : [...prev, allergenId]
        );
      };

      const findMatchingRecipes = () => {
        const anyWorkoutFilter = workoutFilters.preWorkout || workoutFilters.intraWorkout || workoutFilters.postWorkout;
        
        if (anyWorkoutFilter) {
          let workoutRecipes = [];
          if (workoutFilters.preWorkout) {
            workoutRecipes.push(...recipeDatabase.filter(r => r.category === 'pre-workout' && !recipeContainsAllergen(r))
              .map(r => ({ ...r, score: calculateMatchScore(r, targetMacros), portionMultiplier: calculatePortionAdjustment(r, targetMacros.kcal) })));
          }
          if (workoutFilters.intraWorkout) {
            workoutRecipes.push(...recipeDatabase.filter(r => r.category === 'intra-workout' && !recipeContainsAllergen(r))
              .map(r => ({ ...r, score: calculateMatchScore(r, targetMacros), portionMultiplier: calculatePortionAdjustment(r, targetMacros.kcal) })));
          }
          if (workoutFilters.postWorkout) {
            workoutRecipes.push(...recipeDatabase.filter(r => r.category === 'post-workout' && !recipeContainsAllergen(r))
              .map(r => ({ ...r, score: calculateMatchScore(r, targetMacros), portionMultiplier: calculatePortionAdjustment(r, targetMacros.kcal) })));
          }
          setSuggestions(workoutRecipes);
          setActiveTab('suggestions');
          return;
        }

        const scoredRecipes = recipeDatabase
          .filter(r => !['pre-workout', 'intra-workout', 'post-workout'].includes(r.category) && !recipeContainsAllergen(r))
          .map(r => ({ ...r, score: calculateMatchScore(r, targetMacros), portionMultiplier: calculatePortionAdjustment(r, targetMacros.kcal) }));
        
        scoredRecipes.sort((a, b) => a.score - b.score);
        const veganRecipes = scoredRecipes.filter(r => r.isVegan);
        const result = scoredRecipes.slice(0, 2);
        
        if (!result.some(r => r.isVegan) && veganRecipes.length > 0 && !result.find(r => r.id === veganRecipes[0].id)) {
          result[1] = veganRecipes[0];
        }
        
        while (result.length < 3) {
          const remaining = scoredRecipes.filter(r => !result.find(res => res.id === r.id));
          if (remaining.length > 0) {
            const needVegan = !result.some(r => r.isVegan);
            result.push(needVegan ? (remaining.find(r => r.isVegan) || remaining[0]) : remaining[0]);
          } else break;
        }
        
        setSuggestions(result.slice(0, 3));
        setActiveTab('suggestions');
      };

      const addToSelection = (recipe) => {
        if (!selectedRecipes.find(r => r.id === recipe.id)) {
          setSelectedRecipes([...selectedRecipes, recipe]);

      };

        const itemsMap = new Map();

            const food = foodDatabase[ing.foodId];
            if (food) {
              const adjustedAmount = Math.round(ing.amount * recipe.portionMultiplier);
              if (itemsMap.has(ing.foodId)) {
                itemsMap.set(ing.foodId, { ...itemsMap.get(ing.foodId), amount: itemsMap.get(ing.foodId).amount + adjustedAmount });
              } else {
                itemsMap.set(ing.foodId, { name: food.name, amount: adjustedAmount, category: food.category });
              }
            }
          });
        });
        const grouped = {};
        itemsMap.forEach((item) => {
          if (!grouped[item.category]) grouped[item.category] = [];
          grouped[item.category].push(item);
        });
        return grouped;
      }, [selectedRecipes]);

        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

        const mult = recipe.portionMultiplier;
        return {
          kcal: Math.round(recipe.totalNutrition.kcal * mult),
          protein: Math.round(recipe.totalNutrition.protein * mult * 10) / 10,
          carbs: Math.round(recipe.totalNutrition.carbs * mult * 10) / 10,
          fats: Math.round(recipe.totalNutrition.fats * mult * 10) / 10

      };

      return (

                                <h3 className="text-lg font-bold text-white leading-tight">{recipe.name}</h3>
                                <div className="flex flex-col gap-1 items-end">
                                  {recipe.isVegan && <span className="shrink-0 bg-emerald-500 text-white text-xs font-bold px-2.5 py-1 rounded-full">🌱 VEGAN</span>}
                                  {recipe.category === 'pre-workout' && <span className="shrink-0 bg-amber-500 text-white text-xs font-bold px-2.5 py-1 rounded-full">⚡ PRE</span>}
                                  {recipe.category === 'intra-workout' && <span className="shrink-0 bg-cyan-500 text-white text-xs font-bold px-2.5 py-1 rounded-full">🔄 INTRA</span>}
                                  {recipe.category === 'post-workout' && <span className="shrink-0 bg-green-600 text-white text-xs font-bold px-2.5 py-1 rounded-full">💪 POST</span>}
                                </div>
                              </div>
                              <div className="flex items-center gap-3 mt-2 text-sm text-slate-400">
                                <span>⏱️ {recipe.prepTime} Min.</span>
                                <span>{recipe.difficulty === 'easy' ? '🟢 Einfach' : recipe.difficulty === 'medium' ? '🟡 Mittel' : '🔴 Schwer'}</span>
                              </div>
                            </div>
                            
                            {portionPercent !== 100 && (
                              <div className="px-4 py-2 bg-blue-500/10 border-y border-blue-500/20">
                                <span className="text-blue-400 text-sm font-medium">📏 Portion angepasst: {portionPercent}%</span>
                              </div>
                            )}
                            
                            <div className="p-4 grid grid-cols-4 gap-2">
                              <div className="text-center p-2 bg-orange-500/10 rounded-lg">
                                <div className="text-orange-400 font-bold text-lg">{adjustedNutrition.kcal}</div>
                                <div className="text-orange-400/60 text-xs">kcal</div>
                              </div>
                              <div className="text-center p-2 bg-red-500/10 rounded-lg">
                                <div className="text-red-400 font-bold text-lg">{adjustedNutrition.protein}g</div>
                                <div className="text-red-400/60 text-xs">Protein</div>
                              </div>
                              <div className="text-center p-2 bg-blue-500/10 rounded-lg">
                                <div className="text-blue-400 font-bold text-lg">{adjustedNutrition.carbs}g</div>
                                <div className="text-blue-400/60 text-xs">Carbs</div>
                              </div>
                              <div className="text-center p-2 bg-yellow-500/10 rounded-lg">
                                <div className="text-yellow-400 font-bold text-lg">{adjustedNutrition.fats}g</div>
                                <div className="text-yellow-400/60 text-xs">Fette</div>
                              </div>
                            </div>
                            
                            <div className="px-4 pb-2">
                              <h4 className="text-sm font-semibold text-slate-300 mb-2">Zutaten:</h4>
                              <ul className="space-y-1">
                                {recipe.ingredients.map((ing, i) => (
                                  <li key={i} className="text-sm text-slate-400 flex items-center gap-2">
                                    <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
                                    {Math.round(ing.amount * recipe.portionMultiplier)}g {ing.name}
                                  </li>
                                ))}
                              </ul>
                            </div>
                            
                            <div className="px-4 py-3 flex flex-wrap gap-1">
                              {recipe.tags.slice(0, 4).map((tag, i) => (
                                <span key={i} className="text-xs bg-slate-700/50 text-slate-400 px-2 py-1 rounded-full">#{tag}</span>
                              ))}
                            </div>
                            
                            <div className="p-4 pt-0">
                              <button
                                onClick={() => addToSelection(recipe)}
                                disabled={selectedRecipes.find(r => r.id === recipe.id)}
                                className={`w-full py-3 rounded-xl font-semibold transition-all duration-300 ${
                                  selectedRecipes.find(r => r.id === recipe.id)
                                    ? 'bg-slate-700 text-slate-500 cursor-not-allowed'
                                    : 'bg-emerald-500 hover:bg-emerald-400 text-white shadow-lg shadow-emerald-500/25'
                                }`}
                              >
                                {selectedRecipes.find(r => r.id === recipe.id) ? '✓ Hinzugefügt' : '+ Zur Auswahl'}
                              </button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </section>
              )}

              {activeTab === 'selection' && (
                <section className="bg-slate-800/40 backdrop-blur-sm rounded-2xl p-6 md:p-8 border border-slate-700/50">
                  <h2 className="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                    <span className="w-10 h-10 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-lg flex items-center justify-center text-lg">✅</span>
                    Meine Auswahl
                  </h2>
                  
                  {selectedRecipes.length === 0 ? (
                    <div className="text-center py-12">
                      <div className="text-6xl mb-4">📝</div>
                      <p className="text-slate-400 text-lg">Noch keine Rezepte ausgewählt</p>
                    </div>
                  ) : (
                    <>
                      <div className="bg-slate-900/50 rounded-xl p-4 mb-6">
                        <h3 className="text-sm font-semibold text-slate-400 mb-3 uppercase tracking-wider">Gesamtnährwerte</h3>
                        <div className="grid grid-cols-4 gap-4">
                          {(() => {
                            const totals = selectedRecipes.reduce((acc, recipe) => {
                              const adj = getAdjustedNutrition(recipe);
                              return { kcal: acc.kcal + adj.kcal, protein: acc.protein + adj.protein, carbs: acc.carbs + adj.carbs, fats: acc.fats + adj.fats };
                            }, { kcal: 0, protein: 0, carbs: 0, fats: 0 });
                            return (
                              <>
                                <div className="text-center"><div className="text-2xl font-bold text-orange-400">{Math.round(totals.kcal)}</div><div className="text-xs text-slate-500">kcal</div></div>
                                <div className="text-center"><div className="text-2xl font-bold text-red-400">{Math.round(totals.protein)}g</div><div className="text-xs text-slate-500">Protein</div></div>
                                <div className="text-center"><div className="text-2xl font-bold text-blue-400">{Math.round(totals.carbs)}g</div><div className="text-xs text-slate-500">Carbs</div></div>
                                <div className="text-center"><div className="text-2xl font-bold text-yellow-400">{Math.round(totals.fats)}g</div><div className="text-xs text-slate-500">Fette</div></div>
                              </>
                            );
                          })()}
                        </div>
                      </div>
                      
                      <div className="space-y-4">
                        {selectedRecipes.map(recipe => {
                          const adjustedNutrition = getAdjustedNutrition(recipe);
                          return (
                            <div key={recipe.id} className="bg-slate-900/50 rounded-xl p-4 flex items-center gap-4">
                              <div className="flex-1">
                                <div className="flex items-center gap-2">
                                  <h3 className="font-bold text-white">{recipe.name}</h3>
                                  {recipe.isVegan && <span className="bg-emerald-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">🌱</span>}
                                </div>
                                <div className="flex items-center gap-4 mt-1 text-sm">
                                  <span className="text-orange-400">{adjustedNutrition.kcal} kcal</span>
                                  <span className="text-red-400">{adjustedNutrition.protein}g P</span>
                                  <span className="text-blue-400">{adjustedNutrition.carbs}g C</span>
                                  <span className="text-yellow-400">{adjustedNutrition.fats}g F</span>
                                </div>
                              </div>
                              <button onClick={() => removeFromSelection(recipe.id)} className="w-10 h-10 bg-red-500/20 hover:bg-red-500/30 text-red-400 rounded-lg transition-colors flex items-center justify-center">✕</button>
                            </div>
                          );
                        })}
                      </div>
                      
                      <button onClick={() => setActiveTab('shopping')} className="w-full mt-6 bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-400 hover:to-emerald-500 text-white font-bold py-4 px-8 rounded-xl text-lg shadow-lg shadow-emerald-500/25 transition-all duration-300">
                        🛒 Zur Einkaufsliste
                      </button>
                    </>
                  )}
                </section>
              )}

              {activeTab === 'shopping' && (
                <section className="bg-slate-800/40 backdrop-blur-sm rounded-2xl p-6 md:p-8 border border-slate-700/50">
                  <div className="flex items-center justify-between mb-6 flex-wrap gap-4">
                    <h2 className="text-2xl font-bold text-white flex items-center gap-3">
                      <span className="w-10 h-10 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-lg flex items-center justify-center text-lg">🛒</span>
                      Einkaufsliste
                    </h2>
                    {Object.keys(generateShoppingList).length > 0 && (
                      <button onClick={exportShoppingList} className="bg-slate-700 hover:bg-slate-600 text-white font-semibold py-2 px-4 rounded-lg transition-colors flex items-center gap-2">
                        📥 Als .txt exportieren
                      </button>
                    )}
                  </div>
                  
                  {Object.keys(generateShoppingList).length === 0 ? (
                    <div className="text-center py-12">
                      <div className="text-6xl mb-4">🛒</div>
                      <p className="text-slate-400 text-lg">Deine Einkaufsliste ist leer</p>
                    </div>
                  ) : (
                    <div className="space-y-6">
                      {Object.entries(generateShoppingList).map(([category, items]) => (
                        <div key={category} className="bg-slate-900/50 rounded-xl p-4">
                          <h3 className="font-bold text-white mb-3 flex items-center gap-2">
                            <span className="text-xl">{categoryEmojis[category] || '📦'}</span>
                            {categoryNames[category] || category}
                          </h3>
                          <ul className="space-y-2">
                            {items.map((item, i) => (
                              <li key={i} className="flex items-center justify-between text-slate-300 py-1 border-b border-slate-700/50 last:border-0">
                                <span>{item.name}</span>
                                <span className="font-semibold text-emerald-400">{item.amount}g</span>
                              </li>
                            ))}
                          </ul>
                        </div>
                      ))}
                    </div>
                  )}
                </section>
              )}
            </main>

            <footer className="mt-16 text-center text-slate-500 text-sm">
              <div className="flex items-center justify-center gap-2 mb-2">
                <span className="w-6 h-6 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-md flex items-center justify-center text-xs">👨‍🍳</span>
                <span className="font-semibold text-slate-400">Tiltheman's Kitchen</span>
              </div>
              <p>Dein professioneller Partner für optimierte Ernährung</p>
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<NutritionCoachApp />);
  </script>
</body>
</html>
