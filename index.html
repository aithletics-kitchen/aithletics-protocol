// Calculate nutrition for each recipe
recipeDatabase.forEach(recipe => {
  let totalNutrition = { kcal: 0, protein: 0, carbs: 0, fats: 0 };
  recipe.ingredients.forEach(ing => {
    const food = foodDatabase[ing.foodId];
    if (food) {
      const multiplier = ing.amount / 100;
      totalNutrition.kcal += food.kcal * multiplier;
      totalNutrition.protein += food.protein * multiplier;
      totalNutrition.carbs += food.carbs * multiplier;
      totalNutrition.fats += food.fats * multiplier;
    }
  });
  // Kalorien-Konvention (AIthletics): 1g Protein/Carbs = 4,1 kcal, 1g Fett = 9,3 kcal
  recipe.totalNutrition = {
    kcal: Math.round((totalNutrition.protein + totalNutrition.carbs) * 4.1 + totalNutrition.fats * 9.3),
    protein: Math.round(totalNutrition.protein * 10) / 10,
    carbs: Math.round(totalNutrition.carbs * 10) / 10,
    fats: Math.round(totalNutrition.fats * 10) / 10
  };
});

// ============================================
// MAIN APP COMPONENT
// ============================================
function NutritionCoachApp() {
  // State for macro inputs
  const [targetMacros, setTargetMacros] = useState({
    kcal: 500,
    protein: 40,
    carbs: 50,
    fats: 15
  });
  
  // State for workout meal filters
  const [workoutFilters, setWorkoutFilters] = useState({
    preWorkout: false,
    intraWorkout: false,
    postWorkout: false
  });
  
  // State for allergen filters
  const [selectedAllergens, setSelectedAllergens] = useState([]);
  
  // State for recipe suggestions
  const [suggestions, setSuggestions] = useState([]);
  const [selectedRecipes, setSelectedRecipes] = useState([]);
  const [showDatabase, setShowDatabase] = useState(false);
  const [activeTab, setActiveTab] = useState('input');

  // Calculate match score for a recipe
  const calculateMatchScore = (recipe, targets) => {
    const nutrition = recipe.totalNutrition;
    const kcalDiff = Math.abs(nutrition.kcal - targets.kcal) / targets.kcal;
    const proteinDiff = Math.abs(nutrition.protein - targets.protein) / targets.protein;
    const carbsDiff = Math.abs(nutrition.carbs - targets.carbs) / targets.carbs;
    const fatsDiff = Math.abs(nutrition.fats - targets.fats) / targets.fats;
    
    // Weighted score (lower is better)
    const score = (kcalDiff * 0.3) + (proteinDiff * 0.4) + (carbsDiff * 0.15) + (fatsDiff * 0.15);
    return score;
  };

  // Calculate portion adjustment
  const calculatePortionAdjustment = (recipe, targetKcal) => {
    const originalKcal = recipe.totalNutrition.kcal;
    return targetKcal / originalKcal;
  };

  // Check if recipe contains any selected allergens
  const recipeContainsAllergen = (recipe) => {
    if (selectedAllergens.length === 0) return false;
    
    for (const ing of recipe.ingredients) {
      const food = foodDatabase[ing.foodId];
      if (food && food.allergens) {
        for (const allergen of food.allergens) {
          if (selectedAllergens.includes(allergen)) {
            return true;
          }
        }
      }
    }
    return false;
  };

  // Get allergens in a recipe
  const getRecipeAllergens = (recipe) => {
    const allergens = new Set();
    recipe.ingredients.forEach(ing => {
      const food = foodDatabase[ing.foodId];
      if (food && food.allergens) {
        food.allergens.forEach(a => allergens.add(a));
      }
    });
    return Array.from(allergens);
  };

  // Toggle allergen selection
  const toggleAllergen = (allergenId) => {
    setSelectedAllergens(prev => 
      prev.includes(allergenId)
        ? prev.filter(a => a !== allergenId)
        : [...prev, allergenId]
    );
  };

  // Find matching recipes (ALWAYS 3: 2 best + 1 vegan) OR workout meals if selected
  const findMatchingRecipes = () => {
    const tolerance = 0.25; // 25% tolerance
    
    // Check if any workout filter is active
    const anyWorkoutFilter = workoutFilters.preWorkout || workoutFilters.intraWorkout || workoutFilters.postWorkout;
    
    if (anyWorkoutFilter) {
      // Return workout-specific recipes
      let workoutRecipes = [];
      
      if (workoutFilters.preWorkout) {
        const preRecipes = recipeDatabase
          .filter(r => r.category === 'pre-workout')
          .filter(r => !recipeContainsAllergen(r))
          .map(recipe => ({
            ...recipe,
            score: calculateMatchScore(recipe, targetMacros),
            portionMultiplier: calculatePortionAdjustment(recipe, targetMacros.kcal)
          }));
        workoutRecipes.push(...preRecipes);
      }
      
      if (workoutFilters.intraWorkout) {
        const intraRecipes = recipeDatabase
          .filter(r => r.category === 'intra-workout')
          .filter(r => !recipeContainsAllergen(r))
          .map(recipe => ({
            ...recipe,
            score: calculateMatchScore(recipe, targetMacros),
            portionMultiplier: calculatePortionAdjustment(recipe, targetMacros.kcal)
          }));
        workoutRecipes.push(...intraRecipes);
      }
      
      if (workoutFilters.postWorkout) {
        const postRecipes = recipeDatabase
          .filter(r => r.category === 'post-workout')
          .filter(r => !recipeContainsAllergen(r))
          .map(recipe => ({
            ...recipe,
            score: calculateMatchScore(recipe, targetMacros),
            portionMultiplier: calculatePortionAdjustment(recipe, targetMacros.kcal)
          }));
        workoutRecipes.push(...postRecipes);
      }
      
      setSuggestions(workoutRecipes);
      setActiveTab('suggestions');
      return;
    }
    
    // Standard recipe matching (non-workout)
    // Score all non-workout recipes, filtered by allergens
    const scoredRecipes = recipeDatabase
      .filter(r => !['pre-workout', 'intra-workout', 'post-workout'].includes(r.category))
      .filter(r => !recipeContainsAllergen(r))
      .map(recipe => ({
        ...recipe,
        score: calculateMatchScore(recipe, targetMacros),
        portionMultiplier: calculatePortionAdjustment(recipe, targetMacros.kcal)
      }));
    
    // Sort by score (ascending - lower is better)
    scoredRecipes.sort((a, b) => a.score - b.score);
    
    // Get vegan recipes
    const veganRecipes = scoredRecipes.filter(r => r.isVegan);
    
    // Select 2 best matches (can be any type) and 1 guaranteed vegan
    const result = [];
    
    // Add best 2 overall matches
    let added = 0;
    for (const recipe of scoredRecipes) {
      if (added < 2) {
        result.push(recipe);
        added++;
      }
    }
    
    // Ensure at least 1 vegan is included
    const hasVegan = result.some(r => r.isVegan);
    if (!hasVegan && veganRecipes.length > 0) {
      // Replace the worst scoring of the 2 with best vegan
      const bestVegan = veganRecipes[0];
      // Check if vegan is not already in result
      if (!result.find(r => r.id === bestVegan.id)) {
        result[1] = bestVegan; // Replace second spot with vegan
      }
    }
    
    // If we still don't have 3, add more
    while (result.length < 3) {
      const remaining = scoredRecipes.filter(r => !result.find(res => res.id === r.id));
      if (remaining.length > 0) {
        // Prioritize adding a vegan if we don't have one
        const needVegan = !result.some(r => r.isVegan);
        const toAdd = needVegan 
          ? remaining.find(r => r.isVegan) || remaining[0]
          : remaining[0];
        result.push(toAdd);
      } else {
        break;
      }
    }
    
    setSuggestions(result.slice(0, 3));
    setActiveTab('suggestions');
  };

    if (!selectedRecipes.find(r => r.id === recipe.id)) {
      setSelectedRecipes([...selectedRecipes, recipe]);

          const key = ing.foodId;
          if (itemsMap.has(key)) {
            itemsMap.set(key, {
              ...itemsMap.get(key),
              amount: itemsMap.get(key).amount + adjustedAmount
            });
          } else {
            itemsMap.set(key, {
              name: food.name,
              amount: adjustedAmount,
              category: food.category
            });
          }
        }
      });
    });
    
    // Group by category
    const grouped = {};
    itemsMap.forEach((item, key) => {
      const cat = item.category;
      if (!grouped[cat]) {
        grouped[cat] = [];
      }
      grouped[cat].push(item);
    });
    
    return grouped;
  }, [selectedRecipes]);

      text += "-".repeat(30) + "\n";
      items.forEach(item => {
        text += `  • ${item.name}: ${item.amount}g\n`;
      });
      text += "\n";
    });
    
    text += "\n" + "=".repeat(40) + "\n";
    text += "Generiert von Tiltheman's Kitchen\n";
    
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'einkaufsliste.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

      protein: Math.round(recipe.totalNutrition.protein * mult * 10) / 10,

          {/* SELECTION SECTION */}
          {activeTab === 'selection' && (
            <section className="bg-[#232321] rounded-2xl p-6 md:p-8 border border-[#FAF9F5]/10">
              <h2 className="text-2xl font-bold text-[#FAF9F5] mb-6 flex items-center gap-3">
                <span className="w-10 h-10 bg-[#788C5D] rounded-lg flex items-center justify-center"><Icon name="clipboardCheck" size={20} className="text-[#1A1A1A]" /></span>
                Meine Auswahl
              </h2>
              
              {selectedRecipes.length === 0 ? (
                <div className="text-center py-12">
                  <div className="flex justify-center mb-4"><Icon name="clipboardList" size={48} className="text-[#FAF9F5]/30" /></div>
                  <p className="text-[#FAF9F5]/60 text-lg">Noch keine Rezepte ausgewählt</p>
                  <p className="text-[#FAF9F5]/50 text-sm mt-2">Füge Rezepte aus den Vorschlägen hinzu</p>
                </div>
              ) : (
                <>
                  {/* Total Nutrition Summary */}
                  <div className="bg-[#1A1A1A]/60 rounded-xl p-4 mb-6">
                    <h3 className="text-sm font-semibold text-[#FAF9F5]/60 mb-3 uppercase tracking-wider">Gesamtnährwerte</h3>
                    <div className="grid grid-cols-4 gap-4">
                      {(() => {
                        const totals = selectedRecipes.reduce((acc, recipe) => {
                          const adj = getAdjustedNutrition(recipe);
                          return {
                            kcal: acc.kcal + adj.kcal,
                            protein: acc.protein + adj.protein,
                            carbs: acc.carbs + adj.carbs,
                            fats: acc.fats + adj.fats
                          };
                        }, { kcal: 0, protein: 0, carbs: 0, fats: 0 });
                        
                        return (
                          <>
                            <div className="text-center">
                              <div className="text-2xl font-bold text-[#FAF9F5] num">{Math.round(totals.kcal)}</div>
                              <div className="text-[13px] text-[#FAF9F5]/50">kcal</div>
                            </div>
                            <div className="text-center">
                              <div className="text-2xl font-bold text-[#FAF9F5] num">{Math.round(totals.protein)}g</div>
                              <div className="text-[13px] text-[#FAF9F5]/50">Protein</div>
                            </div>
                            <div className="text-center">
                              <div className="text-2xl font-bold text-[#FAF9F5] num">{Math.round(totals.carbs)}g</div>
                              <div className="text-[13px] text-[#FAF9F5]/50">Carbs</div>
                            </div>
                            <div className="text-center">
                              <div className="text-2xl font-bold text-[#FAF9F5] num">{Math.round(totals.fats)}g</div>
                              <div className="text-[13px] text-[#FAF9F5]/50">Fette</div>
                            </div>
                          </>
                        );
                      })()}
                    </div>
                  </div>
                  
                  {/* Selected Recipe Cards */}
                  <div className="space-y-4">
                    {selectedRecipes.map(recipe => {
                      const adjustedNutrition = getAdjustedNutrition(recipe);
                      return (
                        <div key={recipe.id} className="bg-[#1A1A1A]/60 rounded-xl p-4 flex items-center gap-4">
                          <div className="flex-1">
                            <div className="flex items-center gap-2">
                              <h3 className="font-bold text-[#FAF9F5]">{recipe.name}</h3>
                              {recipe.isVegan && (
                                <span className="bg-[#788C5D] text-[#1A1A1A] text-xs font-bold px-2 py-0.5 rounded-full flex items-center" aria-label="Vegan"><Icon name="sprout" size={12} /></span>
                              )}
                            </div>
                            <div className="flex items-center gap-4 mt-1 text-sm">
                              <span className="text-[#FAF9F5]/80 num">{adjustedNutrition.kcal} kcal</span>
                              <span className="text-[#FAF9F5]/80 num">{adjustedNutrition.protein}g P</span>
                              <span className="text-[#FAF9F5]/80 num">{adjustedNutrition.carbs}g C</span>
                              <span className="text-[#FAF9F5]/80 num">{adjustedNutrition.fats}g F</span>
                            </div>
                          </div>
                          <button
                            onClick={() => removeFromSelection(recipe.id)}
                            className="w-11 h-11 bg-[#6B1C2A]/40 hover:bg-[#6B1C2A]/60 text-[#FAF9F5] rounded-lg transition-colors flex items-center justify-center" aria-label="Rezept entfernen"
                          >
                            <Icon name="x" size={18} />
                          </button>
                        </div>
                      );
                    })}
                  </div>
                  
                  <button
                    onClick={() => setActiveTab('shopping')}
                    className="w-full mt-6 bg-[#788C5D] hover:bg-[#98AB7D] text-[#1A1A1A] font-bold py-4 px-8 rounded-xl text-lg transition-all duration-300 flex items-center justify-center gap-2"
                  >
                    <Icon name="cart" size={20} /> Zur Einkaufsliste
                  </button>
                </>
              )}
            </section>
          )}

          {/* SHOPPING LIST SECTION */}
          {activeTab === 'shopping' && (
            <section className="bg-[#232321] rounded-2xl p-6 md:p-8 border border-[#FAF9F5]/10">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-2xl font-bold text-[#FAF9F5] flex items-center gap-3">
                  <span className="w-10 h-10 bg-[#788C5D] rounded-lg flex items-center justify-center"><Icon name="cart" size={20} className="text-[#1A1A1A]" /></span>
                  Einkaufsliste
                </h2>
                {Object.keys(generateShoppingList).length > 0 && (
                  <button
                    onClick={exportShoppingList}
                    className="bg-[#FAF9F5]/10 hover:bg-[#FAF9F5]/20 text-[#FAF9F5] font-semibold py-2.5 px-4 rounded-lg transition-colors flex items-center gap-2"
                  >
                    <Icon name="download" size={16} /> Als .txt exportieren
                  </button>
                )}
              </div>
              
              {Object.keys(generateShoppingList).length === 0 ? (
                <div className="text-center py-12">
                  <div className="flex justify-center mb-4"><Icon name="cart" size={48} className="text-[#FAF9F5]/30" /></div>
                  <p className="text-[#FAF9F5]/60 text-lg">Deine Einkaufsliste ist leer</p>
                  <p className="text-[#FAF9F5]/50 text-sm mt-2">Wähle Rezepte aus, um die Liste zu füllen</p>
                </div>
              ) : (
                <div className="space-y-6">
                  {Object.entries(generateShoppingList).map(([category, items]) => (
                    <div key={category} className="bg-[#1A1A1A]/60 rounded-xl p-4">
                      <h3 className="font-bold text-[#FAF9F5] mb-3 flex items-center gap-2">
                        <Icon name={categoryIcons[category] || 'package'} size={18} className="text-[#98AB7D]" />
                        {categoryNames[category] || category}
                      </h3>
                      <ul className="space-y-2">
                        {items.map((item, i) => (
                          <li key={i} className="flex items-center justify-between text-[#FAF9F5]/80 py-1 border-b border-[#FAF9F5]/10 last:border-0">
                            <span>{item.name}</span>
                            <span className="font-semibold text-[#98AB7D] num">{item.amount}g</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  ))}
                </div>
              )}
            </section>
          )}

          {/* DATABASE VIEWER (Optional) */}
          <section className="mt-8">
            <button
              onClick={() => setShowDatabase(!showDatabase)}
              className="text-[#FAF9F5]/60 hover:text-[#FAF9F5]/80 text-sm font-medium flex items-center gap-2 transition-colors"
            >
              <Icon name={showDatabase ? 'chevronDown' : 'chevronRight'} size={16} />
              {showDatabase ? 'Datenbank ausblenden' : 'Lebensmittel-Datenbank anzeigen'}
            </button>
            
            {showDatabase && (
              <div className="mt-4 bg-[#232321] rounded-2xl p-6 border border-[#FAF9F5]/10 max-h-96 overflow-y-auto">
                <h3 className="text-lg font-bold text-[#FAF9F5] mb-4">Vollständige Nährstoffdatenbank</h3>
                <div className="grid gap-2">
                  {Object.entries(foodDatabase).map(([id, food]) => (
                    <div key={id} className="bg-[#1A1A1A]/60 rounded-lg p-3 flex items-center justify-between">
                      <div>
                        <span className="font-medium text-[#FAF9F5]">{food.name}</span>
                        <div className="flex gap-2 mt-1">
                          {food.tags.slice(0, 3).map((tag, i) => (
                            <span key={i} className="text-xs bg-[#FAF9F5]/5 text-[#FAF9F5]/60 px-1.5 py-0.5 rounded">
                              {tag}
                            </span>
                          ))}
                        </div>
                      </div>
                      <div className="text-right text-sm">
                        <div className="text-[#FAF9F5]/80 num">{food.kcal} kcal</div>
                        <div className="text-[#FAF9F5]/50 num">P: {food.protein}g | C: {food.carbs}g | F: {food.fats}g</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </section>
        </main>

        {/* Footer */}
        <footer className="mt-16 text-center text-[#FAF9F5]/50 text-sm">
          <div className="flex items-center justify-center gap-2 mb-2">
            <span className="w-6 h-6 bg-[#788C5D] rounded-md flex items-center justify-center"><Icon name="chefHat" size={14} className="text-[#1A1A1A]" /></span>
            <span className="font-semibold text-[#FAF9F5]/60">Tiltheman's Kitchen</span>
          </div>
          <p>Dein professioneller Partner für optimierte Ernährung</p>
        </footer>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<NutritionCoachApp />);
  </script>
</body>
</html>
